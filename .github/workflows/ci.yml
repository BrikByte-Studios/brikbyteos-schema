name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate-schema-repo:
    name: Validate schema repo
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      PYTHONUNBUFFERED: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install jsonschema

      - name: Ensure scripts are executable
        run: |
          chmod +x ./scripts/validate-examples.sh

      - name: Validate canonical schema examples
        run: |
          make test

      - name: Ensure repository remains clean after validation
        run: |
          git diff --exit-code || {
            echo "Repository changed during CI. Ensure generated or formatted changes are committed."
            exit 1
          }

  repo-hygiene:
    name: Repo hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify canonical schema files exist
        shell: bash
        run: |
          test -f schemas/raw-result/v0/schema.json
          test -f schemas/normalized-result/v0/schema.json
          test -f schemas/policy-evaluation-result/v0/schema.json
          test -f schemas/verdict/v0/schema.json
          test -f schemas/audit-manifest/v0/schema.json

      - name: Verify canonical example files exist
        shell: bash
        run: |
          test -f schemas/raw-result/v0/examples/valid.minimal.json
          test -f schemas/normalized-result/v0/examples/valid.minimal.json
          test -f schemas/policy-evaluation-result/v0/examples/valid.minimal.json
          test -f schemas/verdict/v0/examples/valid.minimal.json
          test -f schemas/audit-manifest/v0/examples/valid.minimal.json

      - name: Verify governance docs exist
        shell: bash
        run: |
          test -f docs/governance/raw-result-v0-notes.md
          test -f docs/governance/normalized-result-v0-notes.md
          test -f docs/governance/policy-evaluation-result-v0-notes.md
          test -f docs/governance/verdict-v0-notes.md
          test -f docs/governance/audit-manifest-v0-notes.md
          test -f docs/governance/schema-versioning-strategy.md